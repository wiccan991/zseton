<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Zseton Játékok">
<meta name="theme-color" content="#0b3d2e">
<title>Zseton Játékok</title>
<style>
  :root{
    --felt-1:#0e5c44;
    --felt-2:#08301f;
    --gold:#d4af37;
    --gold-dim:#a5842a;
    --plaque:#123a2c;
    --cream:#f3ead9;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(circle at 50% 0%, var(--felt-1) 0%, var(--felt-2) 70%);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--cream);
    overscroll-behavior:none;
  }
  body{
    display:flex; flex-direction:column; align-items:center;
    min-height:100vh; padding:calc(env(safe-area-inset-top) + 40px) 16px calc(env(safe-area-inset-bottom) + 24px);
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700; letter-spacing:1px;
    font-size:26px; color:var(--gold);
    text-shadow:0 1px 0 rgba(0,0,0,0.4);
    margin:0 0 6px;
    text-align:center;
  }
  .sub{
    font-size:13px; color:rgba(243,234,217,0.55);
    margin-bottom:32px; letter-spacing:0.5px; text-align:center;
  }

  .games{
    width:100%; max-width:420px;
    display:flex; flex-direction:column; gap:16px;
  }

  .game-card{
    display:block; text-decoration:none;
    background:
      radial-gradient(ellipse at center, rgba(255,255,255,0.05), transparent 70%),
      var(--felt-1);
    border-radius:16px;
    border:4px solid #6b3a20;
    box-shadow: inset 0 0 24px rgba(0,0,0,0.4), 0 8px 20px rgba(0,0,0,0.4);
    padding:20px 20px;
    color:var(--cream);
  }
  .game-card:active{ transform:translateY(2px); }

  .game-icon{ font-size:30px; margin-bottom:6px; }
  .game-name{
    font-family:Georgia,"Times New Roman",serif;
    font-weight:700; font-size:19px; color:var(--gold);
    margin-bottom:6px;
  }
  .game-desc{
    font-size:13.5px; line-height:1.5; color:rgba(243,234,217,0.75);
  }
</style>
</head>
<body>

  <h1>♦ Zseton Játékok ♦</h1>
  <p class="sub">Válassz, melyik játékkal szeretnél játszani</p>

  <div class="games">
    <a class="game-card" href="zsetonszamolo.html">
      <div class="game-icon">🪙</div>
      <div class="game-name">Zsetonszámoló</div>
      <div class="game-desc">Számold össze az asztalon lévő zsetontornyok értékét — 3 nehézségi szinttel.</div>
    </a>

    <a class="game-card" href="emlekezet_elterelas.html">
      <div class="game-icon">🧠</div>
      <div class="game-name">Emlékezet & Elterelés</div>
      <div class="game-desc">Jegyezz meg egy számot, oldj meg zavaró matekfeladatokat, majd mondd meg, mi volt a szám.</div>
    </a>
  </div>

</body>
</html>
